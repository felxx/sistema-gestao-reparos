{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Cadastro{% endblock %}

{% block content %}
<div class="bg-white rounded shadow-sm p-4">
    <h3 class="h4 mb-3">Formulário de Cadastro</h3>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <button type="submit" class="btn btn-success mt-3">
            Cadastrar
        </button>
    </form>
</div>
{% endblock %}
